<html>
<head>
<title>Table Using Colspan and Rowspan</title>
</head>
<body>
<table border="1" cellspacing=0 cellpadding=10>
<tr align="center">
<td colspan="4" >
Khanewal Self Store
</td>
</tr>
<tr>
<td>Item/Desc</td>
<td>QTY</td>
<td>Price/Unit</td>
<td>Total</td>
</tr>
<tr>
<td>Sugger</td>
<td>5Kg</td>
<td>50</td>
<td>250</td>
</tr>
<tr>
<td>Cooking oil</td>
<td>2kg</td>
<td>200</td>
<td>400</td>
</tr>
<tr>
<td>soap</td>
<td>4 pices</td>
<td>40</td>
<td>160</td>
</tr>
<tr>
<td colspan="3">Sub Total</td>
<td>810</td>
</tr>
<tr>
<td>Tax</td>
<td colspan="2">5%</td>
<td colspan="3">41</td>
</tr>
<tr>
<td colspan="3">Total Bill</td>
<td>851</td>
</tr>
</body>
</html>
