<html>
      <head>
	         <title>CSS demo</title>
			 <style>
			 p{
			     font-size:200%;
				border-left:20px solid red;
				border-right:20px solid green;
				border-top:20px double blue;
				border-bottom:20px double yellow;
				border-radius:20px;
				box-shadow:5px 10px 10px black;
				height:120px;
				text-align:center;
				font-weight:bold;
				text-decoration:underline;
				text-transform:uppercase;
			  }
			        .P1{
					  background-color:rgb(255,255,255);
					  color:#1100ff;
					  
					}
					#P2{
					  background-color:green;
					  color:red;
					  
					}
					
			  </style>
	  </head>
	<body>
	       <p class="P1">this is paragraph</p>
		   <p id="p2">This is paragraph</p>
		   <p style="color:red;">This is paragraph 3</p>
		   input{
		         border-style:none;
				 }
	</body>
</html>
