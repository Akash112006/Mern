<html>

	   <script>

				 function tobinary()
				 {
				 var num=document.getElementById('v1').value;
				 var remainder;
				 var binary="";
				 while(num>0)
				 {
				   remainder=num%2;
				   binary=remainder+binary;
				   num=parseInt(num/2);
				  }
				  document.getElementById('res').value=binary;
				 }
				 
				 
	   </script>
	   </head>
		<body>
	

              <input id="v1" type="text" placeholder="Enter a Number"><br>
			
			
			  <input type="button" value="binary" onclick="tobinary()">
			  <input type="text" placeholder="Result" id="res">
		</body>
</html>
